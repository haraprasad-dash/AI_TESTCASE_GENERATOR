# Docker Compose for TestGen AI Agent
version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testgen-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./templates:/app/templates
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - LOG_LEVEL=INFO
      # JIRA Configuration (set via .env or environment)
      - JIRA_BASE_URL=${JIRA_BASE_URL}
      - JIRA_USERNAME=${JIRA_USERNAME}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      # ValueEdge Configuration
      - VALUEEDGE_BASE_URL=${VALUEEDGE_BASE_URL}
      - VALUEEDGE_CLIENT_ID=${VALUEEDGE_CLIENT_ID}
      - VALUEEDGE_CLIENT_SECRET=${VALUEEDGE_CLIENT_SECRET}
      # LLM Configuration
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testgen-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: testgen-network
